    <!-- GitHub Pages SPA routing fix -->
    <script>
      (function() {
        // Restore path saved by 404.html redirect
        var redirectPath = sessionStorage.getItem('redirectPath');
        if (redirectPath) {
          sessionStorage.removeItem('redirectPath');
          var url = new URL(redirectPath);
          // Restore the path, stripping the repo prefix Vite already handles
          window.history.replaceState(null, null, url.pathname + url.search + url.hash);
        }
      })();
    </script>
